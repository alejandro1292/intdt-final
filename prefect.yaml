name: final_final
prefect-version: 2.14.0

build:
push:

deployments:
  - name: "# Pipeline E2E: Financiero"
    entrypoint: "prefect_flows/flow.py:financial_pipeline"
    work_pool:
      name: "default-agent-pool"

  - name: "Airbyte: Importar MongoDB"
    entrypoint: "prefect_flows/flow.py:airbyte_import_mongo_flow"
    work_pool:
      name: "default-agent-pool"

  - name: "Airbyte: Importar BigQuery"
    entrypoint: "prefect_flows/flow.py:airbyte_import_bq_flow"
    work_pool:
      name: "default-agent-pool"

  - name: "DBT: Ejecutar Transformacion"
    entrypoint: "prefect_flows/flow.py:dbt_build_flow"
    work_pool:
      name: "default-agent-pool"

  - name: "DBT: Auditoria de Calidad"
    entrypoint: "prefect_flows/flow.py:dbt_quality_flow"
    work_pool:
      name: "default-agent-pool"

  - name: "Metabase: Actualizar Visualizacion"
    entrypoint: "prefect_flows/flow.py:metabase_refresh_flow"
    work_pool:
      name: "default-agent-pool"


