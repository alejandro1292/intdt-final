name: 'dbt_project'
version: '1.0.0'
config-version: 2

# Profile matches the name to be used in profiles.yml
profile: 'motherduck_profile'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  dbt_project:
    staging:
      +materialized: view  # Capa de limpieza rápida
    marts:
      +materialized: table # Persistencia para BI

